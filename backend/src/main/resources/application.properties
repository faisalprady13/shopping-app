spring.application.name=backend

spring.datasource.url=${POSTGRES_DB_URI}
spring.datasource.username=${POSTGRES_DB_USER}
spring.datasource.password=${POSTGRES_DB_PASSWD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable Google/GitHub OAuth with SPRING_PROFILES_ACTIVE=oauth and provider env vars.
